<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ephesis&display=swap" rel="stylesheet">
    <title>Javascript Library</title>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="modal-overlay hidden">
        <div class="modal">
            <div class="bookNameFiled modalInputWrapper">
                <label for="name">Name :</label>
                <input type="text" name="name" id="name" required placeholder="Required">
            </div>
            <div class="bookAuthorField modalInputWrapper">
                <label for="author">Author: </label>
                <input type="text" id="author" name="author" required placeholder="Required">
            </div>
            <div class="numfields">
                <div class="bookPages modalInputWrapper">
                    <label for="pages">Pages :</label>
                    <input type="tel" id="pages" name="totalPages" pattern="[0-9]*" required placeholder="Required">
                </div>
                <div class="bookRelease modalInputWrapper">
                    <label for="bookRelease">Release year :</label>
                    <input type="tel" id="bookRelease" name="yearOfRelease" pattern="[0-9]*" required placeholder="Required">
                </div>
            </div>
            <div class="bookStatus">
                <fieldset>
                    <legend>Book Read :</legend>
                    <div class="radioYes">
                        <input type="radio" name="bookStatus" value="Yes" id="yes" checked>
                        <label for="yes">Yes</label>
                    </div>
                    <div class="radioNo">
                        <input type="radio" name="bookStatus" value="No" id="yes" >
                        <label for="yes">No</label>
                    </div>
                </fieldset>
            </div>
            <div class="inputButton">
                <button class="createBook">Add Book</button>
                <button class="cancelButton">Cancel</button>
            </div>
        </div>
    </div>
    <div class="mainContainer">
        <div class="tableContainer">
            <table class="bookTable">
            <caption>Books in library</caption>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Author</th>
                    <th>Total Pages</th>
                    <th>Release Year</th>
                    <th>Book Read?</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
            </table>
        </div>
        <div class="libraryManagementBlock">
            <button class="addBook">Submit a Book</button>
        </div>
    </div>
    
</body>
</html>
