<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ephesis&display=swap" rel="stylesheet">
    <title>Javascript Library</title>
    <script defer src="script.js"></script>
</head>
<body>
    <div class="modal-overlay hidden">
        <div class="bookNameFiled">
            <label for="name">Name :</label>
            <input type="text" name="name" id="name">
        </div>
        <div class="bookAuthorField"></div>
        <label for="author">Author: </label>
        <input type="text" id="author" name="author">
        <div class="numBoofiels">
            <div class="bookPages">
                <label for="pages">Pages :</label>
                <input type="tel" id="pages" name="totalPages">
            </div>
            <div class="bookRelease">
                <label for="bookRelease">Released year :</label>
                <input type="tel" id="bookRelease" name="yearOfRelease">
            </div>
        </div>
        <div class="satusBookFiled">
            <fieldset>
                <legend>Book Read:</legend>
                <div class="radioYes">
                    <input type="radio" name="bookStatus" value="Yes" id="yes" checked>
                    <label for="yes">Yes</label>
                </div>
                <div class="radioNo">
                    <input type="radio" name="bookStatus" value="No" id="yes" checked>
                    <label for="yes">No</label>
                </div>
            </fieldset>
        </div>
        <div class="inputButton"></div>
    </div>

        <div class="tableContainer">

            <caption>Books in library</caption>
            </table>
        </div>
        <div class="libraryManagementBlock">
            <button class="addBook">Submit a Book</button>
        </div>
    </div> -->
    
</body>
</html>
